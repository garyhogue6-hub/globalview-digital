<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalView Digital | Premium Video Editing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-dark: #0a0a0a;
            --sea-blue: #006994;
            --cyan-glow: #00e5ff;
            --text-main: #f8f9fa;
            --text-muted: #a0aec0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden;
            position: relative;
        }

        /* STABILNIJI AMBIJENT I MREŽA */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -10;
            pointer-events: none;
        }

        .glow-left, .glow-right {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -5;
            pointer-events: none;
        }
        .glow-left {
            top: 20%; left: -15vw;
            width: 40vw; height: 40vw;
            background: var(--sea-blue);
            opacity: 0.3;
        }
        .glow-right {
            bottom: 10%; right: -10vw;
            width: 30vw; height: 30vw;
            background: var(--cyan-glow);
            opacity: 0.15;
        }

        /* FLOATING SIDE ELEMENTS */
        .side-text-left {
            position: fixed;
            left: 30px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.5;
            pointer-events: none;
            z-index: 0;
        }
        .side-scroll-right {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0.5;
            z-index: 0;
        }
        .side-scroll-right span {
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 2px;
            writing-mode: vertical-rl;
        }
        .scroll-line {
            width: 1px;
            height: 60px;
            background: linear-gradient(to bottom, var(--cyan-glow), transparent);
        }

        /* GLASSMORPHISM HEADER & BIGGER LOGO */
        header { 
            background: rgba(10, 10, 10, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 50px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; 
            top: 0; 
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 2.6rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            background: linear-gradient(90deg, #ffffff, var(--cyan-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.4);
        }

        nav { display: flex; gap: 40px; }
        nav a { 
            color: var(--text-main); 
            text-decoration: none; 
            font-weight: 600; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            letter-spacing: 2px; 
            transition: color 0.3s, text-shadow 0.3s; 
        }
        nav a:hover { 
            color: var(--cyan-glow); 
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* HERO SECTION */
        .hero { 
            position: relative;
            padding: 160px 20px 100px; 
            max-width: 1200px; 
            margin: 0 auto;
            text-align: center;
            z-index: 10;
        }

        .hero h1 { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 5rem; 
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 25px;
            text-transform: uppercase;
        }
        
        .hero h1 span {
            color: var(--cyan-glow);
            text-shadow: 0 0 25px rgba(0, 229, 255, 0.3);
        }

        .hero p { 
            font-size: 1.25rem; 
            color: var(--text-muted); 
            max-width: 750px; 
            margin: 0 auto 40px auto; 
        }

        .btn { 
            display: inline-block; 
            background: linear-gradient(45deg, var(--sea-blue), var(--cyan-glow)); 
            color: #000; 
            padding: 18px 45px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 700; 
            font-size: 1.05rem; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: transform 0.3s, box-shadow 0.3s; 
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.3);
        }

        /* THE EDITING PROCESS & TIMELINE */
        .process-section {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            z-index: 10;
            position: relative;
        }

        .process-text h2 {
            font-family: 'Montserrat', sans-serif; 
            font-size: 2.8rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .process-text p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* CUSTOM CSS TIMELINE UI */
        .timeline-ui {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px
